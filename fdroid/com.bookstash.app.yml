# F-Droid metadata for BookStash — DRAFT for the fdroiddata submission.
#
# This file is the source of truth for what we will submit. To submit, copy it to
# fdroiddata/metadata/com.bookstash.app.yml in a fork of
# https://gitlab.com/fdroid/fdroiddata and open a merge request.
#
# BookStash is a Capacitor app whose native android/ project is generated at build
# time, so the build recipe regenerates it (cap add/sync) and stamps the version
# from package.json via scripts/set-version.mjs before assembling the RELEASE
# variant (F-Droid signs the result). The Node build step is the part most likely
# to need tweaks during MR review — see FDROID.md.

Categories:
  - Reading
License: GPL-3.0-only
AuthorName: eirthae
SourceCode: https://github.com/eirthae/bookstash
IssueTracker: https://github.com/eirthae/bookstash/issues

AutoName: BookStash
Description: |-
  See fastlane/metadata/android/en-US/full_description.txt in the source repo.

RepoType: git
Repo: https://github.com/eirthae/bookstash.git

Builds:
  - versionName: 0.8.17
    versionCode: 8017
    commit: v0.8.17
    sudo:
      - apt-get update
      - apt-get install -y nodejs npm
    subdir: android/app
    prebuild:
      - npm ci
      - npm run build
      - npx cap add android
      - node ../../scripts/set-version.mjs
      - npx cap sync android
    gradle:
      - yes

AutoUpdateMode: Version
UpdateCheckMode: Tags
CurrentVersion: 0.8.17
CurrentVersionCode: 8017
