# BookStash is a Capacitor app: the native android/ project is generated at build
# time, so the recipe regenerates it (cap add/sync) and stamps the version from
# package.json (scripts/set-version.mjs) before assembling the release variant.
# Title / description / changelog / screenshots are pulled from the repo's
# fastlane/metadata. (This file is also kept in the source repo under fdroid/.)

Categories:
  - Reading
License: GPL-3.0-only
AuthorName: eirthae
SourceCode: https://github.com/eirthae/bookstash
IssueTracker: https://github.com/eirthae/bookstash/issues

RepoType: git
Repo: https://github.com/eirthae/bookstash.git

Builds:
  - versionName: 0.8.26
    versionCode: 8026
    commit: v0.8.26
    sudo:
      - apt-get update
      - apt-get install -y nodejs npm
    subdir: android/app
    prebuild:
      - npm ci
      - npm run build
      - npx cap add android
      - node ../../scripts/set-version.mjs
      - npx cap sync android
    gradle:
      - yes

AutoUpdateMode: Version
UpdateCheckMode: Tags
CurrentVersion: 0.8.26
CurrentVersionCode: 8026
