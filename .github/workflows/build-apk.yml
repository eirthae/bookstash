name: Build APK

# Two ways to run:
#  - Manual (workflow_dispatch): builds the APK as a throwaway Actions artifact.
#  - Push a version tag (v*): builds + publishes a permanent GitHub Release.
# BookStash is local-first — no backend, so there is NO env/secret injection.
on:
  workflow_dispatch:
    inputs:
      no_proxy:
        description: "F-Droid-style build: skip the Supabase proxy (forces on-device AO3)"
        type: boolean
        default: false
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Configure Supabase env (optional — AO3 autocomplete proxy)
        # If SUPABASE_URL + SUPABASE_ACCESS_TOKEN secrets are set (same two
        # FicStash uses), fetch the publishable anon key via the Management API
        # and write .env.production so ONLY the AO3 tag-autocomplete routes through
        # the edge function. Missing/failed → autocomplete falls back on-device,
        # build still succeeds.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ "${{ inputs.no_proxy }}" = "true" ]; then
            echo "no_proxy build — skipping Supabase env (F-Droid-style, on-device AO3)."; exit 0
          fi
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "No Supabase secrets — AO3 autocomplete will use the on-device path."; exit 0
          fi
          ref="$(printf '%s' "$SUPABASE_URL" | sed -E 's#https?://([^.]+)\..*#\1#')"
          anon="$(curl -sS "https://api.supabase.com/v1/projects/$ref/api-keys?reveal=true" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            | jq -r '.[] | select(.name=="anon") | .api_key')"
          if [ -z "$anon" ] || [ "$anon" = "null" ]; then
            echo "Could not retrieve anon key — autocomplete falls back on-device."; exit 0
          fi
          printf 'VITE_SUPABASE_URL=%s\n' "$SUPABASE_URL" >> .env.production
          printf 'VITE_SUPABASE_ANON_KEY=%s\n' "$anon"     >> .env.production
          echo "Wrote .env.production (anon key length: ${#anon})."

      - name: Build web bundle
        # VITE_APP_VERSION stamps the build with the tag (shown in Settings).
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Generate app icons (book glyph on primary-200 background)
        run: |
          npm i -D sharp
          node scripts/gen-icons.mjs
          npx --yes @capacitor/assets generate --android --assetPath resources

      - name: Sync web bundle into Android
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookstash-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # ---- Release on a version tag ----------------------------------------
      - name: Stage versioned APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk "release/bookstash-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/bookstash-*.apk
          generate_release_notes: true
