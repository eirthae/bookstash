name: Build APK

# Two ways to run:
#  - Manual (workflow_dispatch): builds the APK as a throwaway Actions artifact.
#  - Push a version tag (v*): builds + publishes a permanent GitHub Release.
# BookStash is local-first — no backend, so there is NO env/secret injection.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build web bundle
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Generate app icons (book glyph on primary-200 background)
        run: |
          # ImageMagick is preinstalled on ubuntu-latest. Render the foreground
          # glyph (transparent), a solid #c9a9e9 background, a flattened icon, and
          # a branded splash — then let @capacitor/assets fan them out to all
          # Android densities + adaptive icons.
          convert -background none -density 384 resources/icon-foreground.svg -resize 1024x1024 resources/icon-foreground.png
          convert -size 1024x1024 xc:'#c9a9e9' resources/icon-background.png
          convert resources/icon-background.png resources/icon-foreground.png -gravity center -composite resources/icon-only.png
          convert -background none -density 384 resources/icon-foreground.svg -resize 820x820 /tmp/splash-fg.png
          convert -size 2732x2732 xc:'#c9a9e9' resources/splash.png
          convert resources/splash.png /tmp/splash-fg.png -gravity center -composite resources/splash.png
          cp resources/splash.png resources/splash-dark.png
          npx --yes @capacitor/assets generate --android --assetPath resources

      - name: Sync web bundle into Android
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookstash-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # ---- Release on a version tag ----------------------------------------
      - name: Stage versioned APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk "release/bookstash-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/bookstash-*.apk
          generate_release_notes: true
