name: Build APK

# Two ways to run:
#  - Manual (workflow_dispatch): builds the APK as a throwaway Actions artifact.
#  - Push a version tag (v*): builds + publishes a permanent GitHub Release.
# BookStash is fully on-device — no backend, no secrets, no env injection. One
# build, identical to what F-Droid produces from source.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build web bundle
        # VITE_APP_VERSION stamps the build with the tag (shown in Settings).
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}
        run: npm run build

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Generate app icons (book glyph on primary-200 background)
        run: |
          npm i -D sharp
          node scripts/gen-icons.mjs
          npx --yes @capacitor/assets generate --android --assetPath resources

      - name: Sync web bundle into Android
        run: npx cap sync android

      - name: Stamp version (from package.json)
        run: node scripts/set-version.mjs

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      # Validate the F-Droid build path: F-Droid assembles the *release* variant
      # (unsigned; it signs with its own key). We only ship the debug APK, but
      # building release here catches recipe/gradle problems before the fdroiddata
      # merge request rather than during review.
      - name: Validate release variant (F-Droid build)
        working-directory: android
        run: |
          ./gradlew assembleRelease
          ls -la app/build/outputs/apk/release/
          test -f app/build/outputs/apk/release/app-release-unsigned.apk \
            && echo "release variant assembled OK (F-Droid path validated)."

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bookstash-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # ---- Release on a version tag ----------------------------------------
      - name: Stage versioned APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release
          cp android/app/build/outputs/apk/debug/app-debug.apk "release/bookstash-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/bookstash-*.apk
          generate_release_notes: true
