name: Deploy Edge Functions

# Deploys BookStash's only Supabase Edge Function — the AO3 tag-autocomplete
# proxy — to the project named by the SUPABASE_URL secret (use a project
# DEDICATED to BookStash, separate from FicStash). Uses SUPABASE_ACCESS_TOKEN.
# Manual trigger.
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy functions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "SUPABASE_URL / SUPABASE_ACCESS_TOKEN not set — add them first."; exit 1
          fi
          ref="$(printf '%s' "$SUPABASE_URL" | sed -E 's#https?://([^.]+)\..*#\1#')"
          if [ -z "$ref" ]; then echo "Could not derive project ref from SUPABASE_URL"; exit 1; fi
          echo "Deploying tag-autocomplete to project: $ref"
          supabase functions deploy tag-autocomplete --project-ref "$ref"
          echo "Done."
